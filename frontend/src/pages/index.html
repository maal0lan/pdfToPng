<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minimal Blur</title>
  <style>
    :root {
      --accent: #6366f1;
      --bg: #0f172a;
      --panel: rgba(30, 41, 59, 0.7);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Toolbar Styling */
    .toolbar {
      position: fixed;
      top: 20px;
      z-index: 10;
      display: flex;
      gap: 15px;
      padding: 12px 24px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      align-items: center;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    }

    .tool-group { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }

    /* Canvas Container */
    .canvas-container {
      margin-top: 100px;
      position: relative;
      line-height: 0;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    canvas { cursor: none; max-width: 90vw; max-height: 70vh; display: block; }

    /* Visual Brush Follower */
    #brush-preview {
      position: fixed;
      pointer-events: none;
      border: 1px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      z-index: 100;
      display: none;
    }

    /* Inputs & Buttons */
    input[type="range"] { accent-color: var(--accent); width: 80px; }
    
    button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover { background: var(--accent); border-color: var(--accent); }
    
    input[type="file"] { display: none; }
    .upload-label { cursor: pointer; color: var(--accent); font-weight: bold; }

  </style>
</head>
<body>

  <div class="toolbar">
    <label class="upload-label">
      Upload +
      <input type="file" id="upload" accept="image/*">
    </label>

    <div class="tool-group">
      <span>Blur</span>
      <input type="range" id="blurSlider" min="2" max="40" value="15">
    </div>

    <div class="tool-group">
      <span>Size</span>
      <input type="range" id="brushSlider" min="10" max="150" value="50">
    </div>

    <button id="undoBtn">Undo</button>
    <button id="downloadBtn" style="background: var(--accent)">Export</button>
  </div>

  <div class="canvas-container">
    <canvas id="canvas"></canvas>
    <div id="brush-preview"></div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const preview = document.getElementById("brush-preview");
    const upload = document.getElementById("upload");
    const blurSlider = document.getElementById("blurSlider");
    const brushSlider = document.getElementById("brushSlider");
    const undoBtn = document.getElementById("undoBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let drawing = false;
    let history = [];

    // Sync Brush Preview Size
    function updateBrushPreview() {
      preview.style.width = brushSlider.value + "px";
      preview.style.height = brushSlider.value + "px";
    }
    brushSlider.oninput = updateBrushPreview;
    updateBrushPreview();

    upload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          saveState();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function saveState() {
      if (history.length > 15) history.shift();
      history.push(canvas.toDataURL());
    }

    undoBtn.addEventListener("click", () => {
      if (history.length <= 1) return;
      history.pop();
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = history[history.length - 1];
    });

    // Smooth blurring logic
    function blurArea(e) {
      if (!drawing) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      const size = Number(brushSlider.value);
      const blur = Number(blurSlider.value);
      const radius = size / 2;

      ctx.save();
      // Create circular clipping path
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.clip();

      // Apply blur filter only to the drawn portion
      ctx.filter = `blur(${blur}px)`;
      // Draw the canvas onto itself through the filter and clip
      ctx.drawImage(canvas, 0, 0);
      ctx.restore();
    }

    // Interaction Listeners
    window.addEventListener("mousemove", (e) => {
      preview.style.left = e.clientX + "px";
      preview.style.top = e.clientY + "px";
      
      const rect = canvas.getBoundingClientRect();
      const isOverCanvas = (
        e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top && e.clientY <= rect.bottom
      );
      preview.style.display = isOverCanvas ? "block" : "none";
      
      if (drawing) blurArea(e);
    });

    canvas.addEventListener("mousedown", () => { drawing = true; saveState(); });
    window.addEventListener("mouseup", () => { drawing = false; });

    downloadBtn.addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "edit.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  </script>
</body>
</html>
